<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Website của tôi</title>

    <style>
      body {
        font-family: Arial;
        margin: 0;
        background: #f4f4f4;
      }

      header {
        background: #333;
        color: white;
        padding: 15px;
        text-align: center;
      }

      nav {
        background: #555;
        padding: 10px;
        text-align: center;
      }

      nav a {
        color: white;
        margin: 0 15px;
        text-decoration: none;
      }

      nav a:hover {
        color: yellow;
      }

      .container {
        padding: 20px;
      }

      .card {
        background: white;
        padding: 20px;
        margin: 10px 0;
        border-radius: 5px;
        box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
      }

      footer {
        background: #333;
        color: white;
        text-align: center;
        padding: 10px;
        margin-top: 20px;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Website Bán Vé Xem Phim</h1>
    </header>

    <nav>
      <a href="#">Trang chủ</a>
      <a href="#">Phim</a>
      <a href="#">Lịch chiếu</a>
      <a href="#">Liên hệ</a>
    </nav>

    <div class="container">
      <div class="card">
        <h2>Phim đang chiếu</h2>
        <p>Danh sách các phim mới nhất tại rạp.</p>
      </div>

      <div class="card">
        <h2>Khuyến mãi</h2>
        <p>Giảm giá 20% cho sinh viên vào thứ 4.</p>
      </div>
    </div>

    <footer>
      <p>© 2026 Website xem phim</p>
    </footer>
  </body>
</html>
